name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit subjects
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            RANGE="$HEAD_SHA^!"
          else
            RANGE="$BASE_SHA..$HEAD_SHA"
          fi
          python youtube_downloader/scripts/validate_commits.py "$RANGE"

  python:
    name: Python quality and security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            youtube_downloader/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - name: Python tests
        env:
          PYTHONPATH: youtube_downloader
        run: python -m unittest discover -s youtube_downloader/tests -v
      - name: Version consistency
        run: python youtube_downloader/scripts/bump_version.py --check
      - name: Ruff check
        run: ruff check youtube_downloader/app youtube_downloader/scripts youtube_downloader/tests
      - name: Ruff format check
        run: ruff format --check youtube_downloader/app youtube_downloader/scripts youtube_downloader/tests
      - name: Mypy
        run: mypy youtube_downloader/app youtube_downloader/scripts
      - name: Bandit
        run: bandit -c pyproject.toml -r youtube_downloader/app youtube_downloader/scripts
      - name: pip-audit
        run: pip-audit -r youtube_downloader/requirements.txt

  yaml:
    name: YAML and add-on validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install PyYAML yamllint
      - name: YAML validation
        run: yamllint repository.yaml youtube_downloader/config.yaml youtube_downloader/translations .github
      - name: Home Assistant add-on config validation
        run: python youtube_downloader/scripts/validate_addon.py

  image:
    name: Docker ${{ matrix.arch }} and Trivy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: youtube_downloader
          platforms: ${{ matrix.platform }}
          load: true
          tags: media-downloader:ci-${{ matrix.arch }}
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: media-downloader:ci-${{ matrix.arch }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
