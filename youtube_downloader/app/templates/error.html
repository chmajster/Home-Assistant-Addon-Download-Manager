{% extends "base.html" %}
{% block title %}{{ t('error.title') }}{% endblock %}
{% block content %}
  <section class="card app-card error-card">
    <div class="card-body p-4">
      <span class="eyebrow">{{ t('error.eyebrow') }}</span>
      <h1 class="h4 text-danger">{{ t('error.heading') }}</h1>
      <p class="mb-3">{{ message }}</p>
      <a class="btn btn-soft" href="{{ ingress_url('web.index') }}">{{ t('common.back_home') }}</a>
    </div>
  </section>
{% endblock %}
