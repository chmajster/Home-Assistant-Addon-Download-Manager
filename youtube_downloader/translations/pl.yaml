configuration:
  storage_mode:
    name: "Tryb magazynu"
    description: "Wybierz local dla katalogu lokalnego albo nfs dla udziału sieciowego. Po wyborze nfs uzupełnij pola NFS poniżej."
  download_dir:
    name: "Katalog pobrań"
    description: "Trwały katalog docelowy wewnątrz /share albo /media."
  nfs_download_dir:
    name: "Katalog pobrań NFS"
    description: "Ścieżka wewnątrz udziału NFS dodanego w Home Assistant, np. /media/nas/youtube_downloader."
  nfs_server:
    name: "Adres serwera NFS"
    description: "Adres IP lub nazwa hosta NAS, np. 192.168.1.20 albo nas.local."
  nfs_export_path:
    name: "Ścieżka/export NFS"
    description: "Ścieżka udziału na serwerze, np. /volume1/media albo /exports/downloads."
  nfs_username:
    name: "Login NFS"
    description: "Opcjonalny login, jeśli Twoja konfiguracja magazynu sieciowego go wymaga. Klasyczny NFS zwykle go nie używa."
  nfs_password:
    name: "Hasło NFS"
    description: "Opcjonalne hasło. Nie jest wyświetlane w panelu aplikacji."
  nfs_mount_options:
    name: "Opcje montowania NFS"
    description: "Opcje montowania, np. vers=4,soft,timeo=30. Użyj ustawień zgodnych z NAS i Home Assistant."
  max_concurrent_jobs:
    name: "Limit równoległych zadań"
    description: "Maksymalna liczba jednoczesnych pobrań i zapisów live."
  update_ytdlp_on_start:
    name: "Aktualizuj yt-dlp przy starcie"
    description: "Próbuje zaktualizować extractor yt-dlp przed uruchomieniem panelu."
  allow_external_port:
    name: "Włącz stronę bez Ingress"
    description: "Uruchamia dodatkowy publiczny port aplikacji, np. 999, dostępny bez logowania do Home Assistant. Używaj tylko w zaufanej sieci."
  external_port:
    name: "Port strony bez Ingress"
    description: "Port, na którym aplikacja uruchamia dodatkowy dostęp bez logowania. Domyślnie 999; port musi być też udostępniony w sekcji Sieć dodatku."
  debug:
    name: "Tryb debug"
    description: "Włącza rozszerzone logi aplikacji."
  preferred_format:
    name: "Preferowany format"
    description: "Domyślna jakość filmu lub wariant audio prezentowany przez aplikację."
network:
  8099/tcp: "Opcjonalny zewnętrzny dostęp do interfejsu webowego"
  999/tcp: "Publiczny dostęp bez Ingress po włączeniu opcji"
